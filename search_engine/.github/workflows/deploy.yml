# ============================================
# SelmaData Pipeline - CI/CD Workflow
# ============================================
#
# This workflow:
# 1. Runs on every push to main branch
# 2. Installs dependencies
# 3. Runs tests with pytest
# 4. Builds Docker image
# 5. (Optional) Deploys to cloud platform
#
# Required Secrets (for deployment):
# - HACIPROVIDER_API_KEY: Your HaciProvider API key
# - DOCKER_USERNAME: Docker Hub username (for Docker Hub push)
# - DOCKER_PASSWORD: Docker Hub password/token
# 
# For Railway/Render deployment, see comments below.
#
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:  # Manual trigger

env:
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: selma_data-pipeline

jobs:
  # ============================================
  # Test Job
  # ============================================
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          HACIPROVIDER_API_KEY: ${{ secrets.HACIPROVIDER_API_KEY || 'test_key' }}
      
      - name: Upload coveselma_datae report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coveselma_datae.xml
          fail_ci_if_error: false

  # ============================================
  # Lint Job
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linters
        run: |
          pip install ruff black isort mypy
      
      - name: Run Ruff
        run: ruff check . --ignore E501 --ignore F401 || true
      
      - name: Check formatting with Black
        run: black --check . || true
      
      - name: Check imports with isort
        run: isort --check-only . || true

  # ============================================
  # Build Docker Image
  # ============================================
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub (optional)
        if: secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME && format('{0}/{1}', secrets.DOCKER_USERNAME, env.DOCKER_IMAGE) || env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

